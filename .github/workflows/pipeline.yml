name: Knight Capital Advanced Guard

on:
  push:
  pull_request:

jobs:
  comprehensive-check:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: 1. Checkout source code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      # 2. Setup Java
      - name: 2. Setup JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # LAYER 1: Scan nhanh (fail ngay)
      - name: Layer 1 - Custom Script Scan (Fast Fail)
        run: |
          echo "🔍 Scanning dangerous keywords..."
          if grep -r "activatePowerPegMode" src/main/java; then
            echo "❌ FOUND dangerous function! STOP pipeline."
            exit 1
          fi

      # LAYER 2: SonarCloud phân tích sâu
      - name: Layer 2 - SonarCloud Analysis (Deep Scan)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify sonar:sonar \
          -Dsonar.projectKey=hoangnhan224_nhatthuan \
          -Dsonar.organization=hoangnhan224 \
          -Dsonar.host.url=https://sonarcloud.io

      # Build (chỉ chạy nếu trên PASS)
      - name: 3. Build Artifact
        run: mvn -B package --file pom.xml
